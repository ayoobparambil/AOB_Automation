name: AOB_Playwright_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

schedules:
  - cron: "0 16 * * *"
    displayName: Nightly AOB browser workflow tests
    branches:
      include:
        - main
        - master
    always: true

parameters:
  - name: baseUrl
    displayName: AOB base URL
    type: string
    default: https://stage.bponline.dev
  - name: testScript
    displayName: npm test script
    type: string
    default: test
    values:
      - test
      - test:approve
      - test:download
      - test:decline
      - test:submit-search
      - test:seeded-search

pool:
  vmImage: ubuntu-latest

variables:
  AOB_BASE_URL: ${{ parameters.baseUrl }}
  AOB_OPEN_REPORT: "0"

jobs:
  - job: browser_workflow_tests
    displayName: Browser workflow tests
    timeoutInMinutes: 45

    steps:
      - checkout: self

      - task: NodeTool@0
        displayName: Use Node.js 22
        inputs:
          versionSpec: "22.x"

      - script: npm ci
        displayName: Install dependencies

      - script: npx playwright install --with-deps chromium
        displayName: Install Playwright Chromium

      - bash: |
          if [ -n "$DEPLOY_CSV_BASE64" ]; then
            echo "$DEPLOY_CSV_BASE64" | base64 --decode > deploy.csv
          fi

          if [ -n "$SEARCH_INPUT_CSV_BASE64" ]; then
            echo "$SEARCH_INPUT_CSV_BASE64" | base64 --decode > search-input.csv
          fi
        displayName: Restore CSV test data
        env:
          DEPLOY_CSV_BASE64: $(AOB_DEPLOY_CSV_BASE64)
          SEARCH_INPUT_CSV_BASE64: $(AOB_SEARCH_INPUT_CSV_BASE64)

      - script: npm run build
        displayName: Build TypeScript

      - script: npm run ${{ parameters.testScript }}
        displayName: Run Playwright tests
        env:
          AOB_BASE_URL: $(AOB_BASE_URL)
          AOB_OPEN_REPORT: $(AOB_OPEN_REPORT)

      - task: PublishPipelineArtifact@1
        displayName: Publish Playwright report
        condition: always()
        inputs:
          targetPath: playwright-report
          artifact: playwright-report
        continueOnError: true

      - task: PublishPipelineArtifact@1
        displayName: Publish test results
        condition: always()
        inputs:
          targetPath: test-results
          artifact: test-results
        continueOnError: true

      - task: PublishPipelineArtifact@1
        displayName: Publish business report
        condition: always()
        inputs:
          targetPath: business-report
          artifact: business-report
        continueOnError: true
