name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: AOB base URL
        required: false
        default: https://stage.bponline.dev
      test_script:
        description: npm script to run
        required: false
        default: test
        type: choice
        options:
          - test
          - test:approve
          - test:download
          - test:decline
          - test:submit-search
          - test:seeded-search
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Browser workflow tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AOB_BASE_URL: ${{ github.event.inputs.base_url || 'https://stage.bponline.dev' }}
      AOB_OPEN_REPORT: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Restore CSV test data
        shell: bash
        run: |
          if [ -n "${{ secrets.AOB_DEPLOY_CSV_BASE64 }}" ]; then
            echo "${{ secrets.AOB_DEPLOY_CSV_BASE64 }}" | base64 --decode > deploy.csv
          fi

          if [ -n "${{ secrets.AOB_SEARCH_INPUT_CSV_BASE64 }}" ]; then
            echo "${{ secrets.AOB_SEARCH_INPUT_CSV_BASE64 }}" | base64 --decode > search-input.csv
          fi

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npm run ${{ github.event.inputs.test_script || 'test' }}

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Upload business report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-report
          path: business-report/
          if-no-files-found: ignore
